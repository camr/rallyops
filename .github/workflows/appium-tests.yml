name: Appium UI Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  appium-ui-tests:
    name: Appium UI Tests
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: appium/package-lock.json

      - name: Run Appium tests
        run: ./scripts/ci-test.sh
        env:
          DEVICE_NAME: ''

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: appium-test-results
          path: appium/test-results/
          if-no-files-found: ignore
